            let html = '<div style="padding: 10px;">';
            
            // Group nodes by zone
            const zones_ordered = ['core', 'bio', 'hitl', 'entangle'];
            zones_ordered.forEach(zoneId => {
                const zoneNodes = Object.entries(nodeDatabase).filter(([_, node]) => node.zone === zoneId);
                
                html += `
                    <div style="margin-bottom: 25px;">
                        <h3 style="color: ${zoneColors[zoneId].border}; border-bottom: 2px solid ${zoneColors[zoneId].border}; padding-bottom: 8px; margin-bottom: 15px;">
                            ${zones[zoneId].name} (${zoneNodes.length})
                        </h3>
                        <ul class="node-list">
                `;
                
                zoneNodes.forEach(([nodeId, node]) => {
                    html += `
                        <li class="node-item" onclick="showNodeDetail('${nodeId}')">
                            <div class="node-header">
                                <span class="node-name">${nodeId}</span>
                                <span class="node-type">${node.type}</span>
                            </div>
                            <div class="node-role">${node.role}</div>
                            <div style="font-size: 0.85em; color: #4a5568; margin-bottom: 8px;">
                                ${node.function.substring(0, 100)}...
                            </div>
                            <div class="node-protocols">
                                ${node.protocols.slice(0, 3).map(p => {
                                    let protoClass = 'protocol-qsp';
                                    if (p.includes('DNA')) protoClass = 'protocol-dna';
                                    if (p.includes('HITL') || p.includes('PPP')) protoClass = 'protocol-hitl';
                                    if (p.includes('BLAP')) protoClass = 'protocol-blap';
                                    if (p.includes('MYCO')) protoClass = 'protocol-myc';
                                    return `<span class="protocol-tag ${protoClass}">${p}</span>`;
                                }).join('')}
                                ${node.protocols.length > 3 ? `<span class="protocol-tag">+${node.protocols.length-3}</span>` : ''}
                            </div>
                            <div style="display: flex; gap: 15px; font-size: 0.8em; color: #8a94a0;">
                                <span><span class="status-badge status-${node.status.toLowerCase()}"></span>${node.status}</span>
                                <span>🔌 ${node.interfaces.length} ports</span>
                                ${node.coherence ? `<span>⚛️ ${node.coherence}</span>` : ''}
                            </div>
                        </li>
                    `;
                });
                
                html += '</ul></div>';
            });
            
            html += '</div>';
            panel.innerHTML = html;
        }

        // Render Protocols Panel
        function renderProtocolsPanel() {
            const protocols = {
                'QSP (Quantum Sensory Protocol)': {
                    zone: 'All Zones',
                    description: 'Intent-focused messaging protocol that uses phase synchronization instead of packet delivery. Mirrors human perception rather than binary logic.',
                    layers: ['L5 - Galactic Application', 'Phase synchronization', 'Resonance-based handshake'],
                    nodes: ['NR-A', 'NR-B', 'NR-C', 'NR-D', 'QNode-A', 'QNode-B', 'QNode-C', 'QNode-D']
                },
                'MYCO-RIP (Mycelial Routing)': {
                    zone: 'Core, Bio',
                    description: 'Routing protocol based on fungal growth algorithms. Provides self-healing capabilities and redundant path discovery.',
                    layers: ['L3 - Network Layer', 'Based on Physarum polycephalum logic', 'Resonance cost metric'],
                    nodes: ['NR-A', 'NR-B', 'NR-C', 'NR-D', 'SW-BIO', 'NR-E', 'NR-F']
                },
                'DNA-STORE': {
                    zone: 'Bio',
                    description: 'Molecular storage protocol for encoding digital data in synthetic DNA. Uses Reed-Solomon error correction.',
                    layers: ['L1 - Physical', 'CRISPR-Write encoding', 'Reed-Solomon ECC (255,223)'],
                    nodes: ['DNA-Store', 'PC-Bio2', 'NR-E']
                },
                'BLAP (Bio-Link Access Protocol)': {
                    zone: 'Bio',
                    description: 'Addressing protocol using 64-bit mitochondrial DNA sequences for node identification.',
                    layers: ['L2 - Data Link', 'Mitochondrial addressing', 'Self-healing link management'],
                    nodes: ['SW-BIO']
                },
                'HITL-CTRL': {
                    zone: 'HITL',
                    description: 'Human-in-the-loop control protocol for overriding critical routing decisions. Requires 2-of-2 consensus.',
                    layers: ['L5 - Application', 'Ethics engine v2.3', 'IEEE-7000 compliance'],
                    nodes: ['HITL-GW', 'PC-HITL1', 'PC-HITL2', 'SW-HITL']
                },
                'PPP (Paradox Prevention Protocol)': {
                    zone: 'HITL',
                    description: 'Prevents causality violations in non-local communication. Drops packets that would decrease local entropy beyond threshold.',
                    layers: ['L5 - Security', 'Chronological guardrails', 'Entropy checking'],
                    nodes: ['HITL-GW', 'SW-HITL']
                },
                'SPIN-BRIDGE': {
                    zone: 'Core',
                    description: 'Converts quantum spin states to classical bits. Implements SpinToBit() conversion logic.',
                    layers: ['L4 - Quantum-Digital Bridge', '1 qubit → 2 classical bits', 'Superdense coding'],
                    nodes: ['NR-A', 'NR-B', 'NR-D']
                },
                'Entanglement Swapping': {
                    zone: 'Entangle',
                    description: 'Extends quantum network range by linking non-adjacent nodes through intermediate entanglement.',
                    layers: ['L3 - Network', 'Bell state management', 'CHSH testing'],
                    nodes: ['QNode-B', 'QNode-C']
                }
            };

            const panel = document.getElementById('protocolPanel');
            let html = '<div style="padding: 15px;">';
            
            Object.entries(protocols).forEach(([name, info]) => {
                html += `
                    <div style="background: white; border-radius: 12px; padding: 18px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid ${zoneColors[info.zone.split(',')[0].toLowerCase()]?.border || '#1a6faf'};">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                            <h4 style="color: #1a1d21; font-size: 1.1em;">📡 ${name}</h4>
                            <span class="zone-badge badge-${info.zone.split(',')[0].toLowerCase()}">${info.zone}</span>
                        </div>
                        <p style="color: #4a5568; margin-bottom: 15px; font-size: 0.95em;">${info.description}</p>
                        <div style="margin-bottom: 12px;">
                            <div style="font-weight: 600; color: #1a1d21; margin-bottom: 5px;">🔧 Implementation Layers:</div>
                            <ul style="margin-left: 20px; color: #4a5568;">
                                ${info.layers.map(l => `<li style="margin-bottom: 3px;">${l}</li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <div style="font-weight: 600; color: #1a1d21; margin-bottom: 5px;">📋 Used by:</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 5px;">
                                ${info.nodes.map(nodeId => {
                                    const node = nodeDatabase[nodeId];
                                    return `<span class="protocol-tag" style="background: ${zoneColors[node.zone].fill}; border: 1px solid ${zoneColors[node.zone].border}; color: ${zoneColors[node.zone].border}; cursor: pointer;" onclick="showNodeDetail('${nodeId}')">${nodeId}</span>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            panel.innerHTML = html;
        }

        // Show node detail
        function showNodeDetail(nodeId) {
            const node = nodeDatabase[nodeId];
            if (!node) return;
            
            const zoneColor = zoneColors[node.zone].border;
            
            let html = `
                <div style="margin-bottom: 20px;">
                    <h2 style="color: ${zoneColor}; margin-bottom: 5px;">${nodeId}</h2>
                    <p style="color: #4a5568; font-size: 1.1em;">${node.role}</p>
                </div>
                
                <div class="detail-grid">
                    <div class="detail-section">
                        <h4>📋 Node Information</h4>
                        <div class="detail-row">
                            <span class="detail-label">Zone:</span>
                            <span class="detail-value" style="color: ${zoneColor};">${node.zone.toUpperCase()}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Type:</span>
                            <span class="detail-value">${node.type}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">IP/Subnet:</span>
                            <span class="detail-value">${node.ip}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Status:</span>
                            <span class="detail-value"><span class="status-badge status-${node.status.toLowerCase()}"></span>${node.status}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Uptime:</span>
                            <span class="detail-value">${node.uptime || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Hardware:</span>
                            <span class="detail-value">${node.hardware}</span>
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>🎯 Function</h4>
                        <p style="color: #4a5568; line-height: 1.5;">${node.function}</p>
                    </div>
                    
                    <div class="detail-section">
                        <h4>📡 Protocols</h4>
                        <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;">
                            ${node.protocols.map(p => {
                                let protoClass = 'protocol-qsp';
                                if (p.includes('DNA')) protoClass = 'protocol-dna';
                                if (p.includes('HITL') || p.includes('PPP')) protoClass = 'protocol-hitl';
                                if (p.includes('BLAP')) protoClass = 'protocol-blap';
                                if (p.includes('MYCO')) protoClass = 'protocol-myc';
                                return `<span class="protocol-tag ${protoClass}">${p}</span>`;
                            }).join('')}
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>🔌 Interfaces</h4>
                        <ul class="interface-list">
                            ${node.interfaces.map(i => `
                                <li class="interface-item">
                                    <span><strong>${i.name}</strong> (${i.type})</span>
                                    <span style="color: ${i.status === 'Up' ? '#2d7a4f' : '#c0392b'};">${i.status}</span>
                                </li>
                                <li style="font-size: 0.85em; color: #4a5568; margin-left: 20px; margin-bottom: 5px;">
                                    IP: ${i.ip} | Speed: ${i.speed}
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `;
            
            // Add quantum section if applicable
            if (node.quantum) {
                html += `
                    <div class="detail-section" style="margin-top: 20px;">
                        <h4>⚛️ Quantum State</h4>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                            ${Object.entries(node.quantum).map(([key, value]) => `
                                <div class="detail-row">
                                    <span class="detail-label">${key}:</span>
                                    <span class="detail-value">${value}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            // Add bio section if applicable
            if (node.bio) {
                html += `
                    <div class="detail-section" style="margin-top: 20px;">
                        <h4>🧬 Biological Metrics</h4>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                            ${Object.entries(node.bio).map(([key, value]) => `
                                <div class="detail-row">
                                    <span class="detail-label">${key}:</span>
                                    <span class="detail-value">${value}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            // Add metrics
            html += `
                <div class="detail-section" style="margin-top: 20px;">
                    <h4>📊 Performance Metrics</h4>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                        ${Object.entries(node.metrics || {}).map(([key, value]) => `
                            <div class="detail-row">
                                <span class="detail-label">${key}:</span>
                                <span class="detail-value">${value}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="detail-section" style="margin-top: 20px;">
                    <h4>🔗 Connected to:</h4>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                        ${(node.connections || []).map(connId => {
                            const connNode = nodeDatabase[connId];
                            return `<span class="protocol-tag" style="background: ${zoneColors[connNode.zone].fill}; border: 1px solid ${zoneColors[connNode.zone].border}; color: ${zoneColors[connNode.zone].border}; cursor: pointer;" onclick="showNodeDetail('${connId}')">${connId} (${connNode.zone})</span>`;
                        }).join('')}
                    </div>
                </div>
                
                <div style="margin-top: 20px; padding: 10px; background: #f0f4f8; border-radius: 6px;">
                    <span class="detail-label">Python Module:</span>
                    <span class="detail-value" style="font-family: monospace;">${node.pythonModule}</span>
                </div>
            `;
            
            document.getElementById('nodeDetailContent').innerHTML = html;
            document.getElementById('nodeDetailView').classList.add('active');
            document.getElementById('detailNodeName').textContent = `${nodeId} - ${node.name}`;
        }

        function closeNodeDetail() {
            document.getElementById('nodeDetailView').classList.remove('active');
        }

        // Canvas click handler
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            // Check each node
            Object.entries(nodePositions).forEach(([nodeId, pos]) => {
                const distance = Math.sqrt(
                    Math.pow(mouseX - pos.x, 2) + 
                    Math.pow(mouseY - pos.y, 2)
                );
                
                if (distance < 25) {
                    showNodeDetail(nodeId);
                }
            });
        });

        // Highlight zone function
        function highlightZone(zone) {
            draw(); // Reset first
            
            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = zoneColors[zone].border;
            
            Object.entries(nodePositions).forEach(([nodeId, pos]) => {
                if (nodeDatabase[nodeId] && nodeDatabase[nodeId].zone === zone) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 30, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            ctx.restore();
        }

        // Drawing functions (simplified - reuse from previous canvas code)
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw zones background
            drawZones();
            
            // Draw links
            drawLinks();
            
            // Draw nodes
            drawNodes();
        }

        function drawZones() {
            // Core zone
            ctx.save();
            ctx.fillStyle = zoneColors.core.fill;
            ctx.strokeStyle = zoneColors.core.border;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.rect(100, 50, 750, 220);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = zoneColors.core.border;
            ctx.font = 'bold 14px Inter, sans-serif';
            ctx.fillText('CORE ZONE', 120, 80);
            ctx.restore();

            // Bio zone
            ctx.save();
            ctx.fillStyle = zoneColors.bio.fill;
            ctx.strokeStyle = zoneColors.bio.border;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.rect(50, 300, 400, 290);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = zoneColors.bio.border;
            ctx.font = 'bold 14px Inter, sans-serif';
            ctx.fillText('BIO ZONE', 70, 330);
            ctx.restore();

            // HITL zone
            ctx.save();
            ctx.fillStyle = zoneColors.hitl.fill;
            ctx.strokeStyle = zoneColors.hitl.border;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.rect(500, 300, 350, 290);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = zoneColors.hitl.border;
            ctx.font = 'bold 14px Inter, sans-serif';
            ctx.fillText('HITL ZONE', 520, 330);
            ctx.restore();

            // Entanglement zone
            ctx.save();
            ctx.fillStyle = zoneColors.entangle.fill;
            ctx.strokeStyle = zoneColors.entangle.border;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.rect(100, 600, 750, 80);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = zoneColors.entangle.border;
            ctx.font = 'bold 14px Inter, sans-serif';
            ctx.fillText('ENTANGLEMENT ZONE', 120, 630);
            ctx.restore();
        }

        function drawLinks() {
            links.forEach(link => {
                const from = nodePositions[link.from];
                const to = nodePositions[link.to];
                
                ctx.save();
                
                switch(link.type) {
                    case 'quantum':
                        ctx.strokeStyle = '#2d7a4f';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([8, 6]);
                        break;
                    case 'swap':
                        ctx.strokeStyle = '#8a9a8a';
                        ctx.lineWidth = 1.5;
                        ctx.setLineDash([4, 6]);
                        break;
                    case 'serial':
                        ctx.strokeStyle = '#8a94a0';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([6, 4]);
                        break;
                    default:
                        ctx.strokeStyle = '#b0bcc8';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([]);
                }
                
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();
                
                ctx.restore();
            });
        }

        function drawNodes() {
            Object.entries(nodePositions).forEach(([nodeId, pos]) => {
                const node = nodeDatabase[nodeId];
                if (!node) return;
                
                const zoneColor = zoneColors[node.zone].border;
                
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 3;
                
                // Draw node shape based on type
                ctx.fillStyle = 'white';
                ctx.strokeStyle = zoneColor;
                ctx.lineWidth = 3;
                
                switch(node.type) {
                    case 'router':
                        ctx.beginPath();
                        ctx.moveTo(pos.x, pos.y - 20);
                        ctx.lineTo(pos.x + 20, pos.y);
                        ctx.lineTo(pos.x, pos.y + 20);
                        ctx.lineTo(pos.x - 20, pos.y);
                        ctx.closePath();
                        break;
                        
                    case 'switch':
                        ctx.beginPath();
                        roundedRect(ctx, pos.x - 20, pos.y - 12, 40, 24, 5);
                        break;
                        
                    case 'qnode':
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, 18, 0, Math.PI * 2);
                        break;
                        
                    default:
                        ctx.beginPath();
                        roundedRect(ctx, pos.x - 18, pos.y - 12, 36, 24, 4);
                }
                
                ctx.fill();
                ctx.stroke();
                
                // Node label
                ctx.shadowBlur = 0;
                ctx.font = 'bold 12px Inter, sans-serif';
                ctx.fillStyle = '#1a1d21';
                ctx.textAlign = 'center';
                ctx.fillText(nodeId, pos.x, pos.y - 25);
                
                // Status dot
                ctx.beginPath();
                ctx.arc(pos.x + 15, pos.y - 15, 4, 0, Math.PI * 2);
                ctx.fillStyle = node.status === 'Active' ? '#2d7a4f' : node.status === 'Standby' ? '#f59e0b' : '#8a94a0';
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                ctx.restore();
            });
        }

        function roundedRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            return ctx;
        }

        // Initialize
        draw();
        renderZonesPanel();
    </script>
